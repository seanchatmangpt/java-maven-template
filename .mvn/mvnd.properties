# Maven Daemon (mvnd) Configuration
# mvnd 2.0.0-rc-3 (Maven 4) + GraalVM CE 26.x (Java 26 required)
# Install mvnd: https://github.com/apache/maven-mvnd/releases/download/2.0.0-rc-3/maven-mvnd-2.0.0-rc-3-linux-amd64.tar.gz
# Install GraalVM CE 26: https://github.com/graalvm/graalvm-ce-builds/releases (jdk-26)

java.home=/usr/lib/jvm/graalvm-community-openjdk-26

idleTimeout=PT30M
threads=1C
minHeapSize=256m
maxHeapSize=1g
