# Maven Daemon (mvnd) Configuration
# mvnd 2.0.0-rc-3 (Maven 4) + GraalVM CE 25.0.2 (default)
# Java 26 requires updating java.home to a GraalVM CE 26 build
# Install mvnd: https://github.com/apache/maven-mvnd/releases/download/2.0.0-rc-3/maven-mvnd-2.0.0-rc-3-linux-amd64.tar.gz
# Install GraalVM CE 25: https://github.com/graalvm/graalvm-ce-builds/releases/download/jdk-25.0.2/graalvm-community-jdk-25.0.2_linux-x64_bin.tar.gz

java.home=/usr/lib/jvm/graalvm-community-openjdk-25.0.2+10.1

idleTimeout=PT30M
threads=1C
minHeapSize=256m
maxHeapSize=1g
