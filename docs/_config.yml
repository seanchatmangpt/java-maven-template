# GitHub Pages configuration for Java 26 OTP Library & Migration Toolkit

# Site settings
title: "Java 26 OTP Library"
description: "Erlang/OTP fault-tolerance primitives for Java 26: 15 primitives, jgen code generation, and innovation engines"
url: "https://seanchatmangpt.github.io"
baseurl: "/java-maven-template"

# Repository information
repository: "seanchatmangpt/java-maven-template"

# Author information
author:
  name: "Sean Chatman"
  url: "https://github.com/seanchatmangpt"

# GitHub Pages settings
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Exclude from processing
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - package.json
  - package-lock.json

# Include files
include:
  - _pages

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Sass configuration
sass:
  style: compressed

# Collections (if needed in future)
collections_dir: collections

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# SEO and social
social:
  name: "Sean Chatman"
  links:
    - "https://github.com/seanchatmangpt"

# GitHub metadata (for GitHub Pages)
github:
  repository_url: "https://github.com/seanchatmangpt/java-maven-template"

# Theme (using default GitHub Pages theme for now)
theme: minima

# Custom variables for the template
template:
  version: "2.0.0"
  java_version: "26"
  features:
    - "Java 26 Ready"
    - "15 OTP Primitives"
    - "jgen Code Generation (72 templates)"
    - "Innovation Engines"
    - "Dogfood Verification"
    - "Virtual Threads"
    - "Diátaxis Documentation"